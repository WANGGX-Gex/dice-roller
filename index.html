<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 掷骰子</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: #1a1a2e; }
#canvas-container { width: 100vw; height: 100vh; }
canvas { display: block; }

/* Left panel */
#panel {
  position: fixed; left: 0; top: 0; bottom: 0; width: 220px;
  background: linear-gradient(180deg, rgba(20,20,40,0.95), rgba(10,10,30,0.95));
  border-right: 2px solid rgba(255,215,0,0.3);
  display: flex; flex-direction: column; z-index: 10;
  backdrop-filter: blur(10px);
}
#panel-title {
  text-align: center; color: #ffd700; font-size: 20px; font-weight: bold;
  padding: 16px 10px 10px; border-bottom: 1px solid rgba(255,215,0,0.2);
  text-shadow: 0 0 10px rgba(255,215,0,0.5);
}
#dice-selector {
  flex: 1; overflow-y: auto; padding: 10px;
}
.dice-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px; background: rgba(255,255,255,0.05);
  border-radius: 8px; padding: 6px 10px;
  border: 1px solid rgba(255,255,255,0.08);
  transition: background 0.2s;
}
.dice-row:hover { background: rgba(255,255,255,0.1); }
.dice-label {
  font-size: 15px; font-weight: bold; min-width: 42px; text-align: center;
}
.dice-count-controls {
  display: flex; align-items: center; gap: 6px;
}
.dice-count-controls button {
  width: 28px; height: 28px; border: none; border-radius: 50%;
  background: rgba(255,255,255,0.15); color: #fff; font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.dice-count-controls button:hover { background: rgba(255,215,0,0.4); }
.dice-count {
  font-size: 16px; color: #fff; min-width: 20px; text-align: center;
}

#roll-btn {
  margin: 10px 14px 14px; padding: 12px; border: none; border-radius: 10px;
  background: linear-gradient(135deg, #ffd700, #ff8c00);
  color: #1a1a2e; font-size: 18px; font-weight: bold; cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 15px rgba(255,215,0,0.3);
}
#roll-btn:hover { transform: scale(1.03); box-shadow: 0 6px 20px rgba(255,215,0,0.5); }
#roll-btn:active { transform: scale(0.97); }

#clear-btn {
  margin: 0 14px 14px; padding: 8px; border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px; background: transparent; color: #aaa;
  font-size: 13px; cursor: pointer; transition: all 0.2s;
}
#clear-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

/* Results panel */
#results {
  position: fixed; right: 0; top: 0; width: 200px;
  background: linear-gradient(180deg, rgba(20,20,40,0.92), rgba(10,10,30,0.92));
  border-left: 2px solid rgba(255,215,0,0.3);
  padding: 16px; z-index: 10; max-height: 100vh; overflow-y: auto;
  backdrop-filter: blur(10px);
}
#results-title {
  color: #ffd700; font-size: 18px; font-weight: bold; text-align: center;
  margin-bottom: 12px; text-shadow: 0 0 10px rgba(255,215,0,0.5);
}
.result-group { margin-bottom: 10px; }
.result-group-label {
  font-size: 13px; font-weight: bold; margin-bottom: 4px;
}
.result-values {
  display: flex; flex-wrap: wrap; gap: 4px;
}
.result-chip {
  padding: 2px 8px; border-radius: 4px; font-size: 13px;
  background: rgba(255,255,255,0.1); color: #eee;
}
#total-bar {
  margin-top: 12px; padding-top: 12px;
  border-top: 2px solid rgba(255,215,0,0.3);
  text-align: center;
}
#total-label { color: #aaa; font-size: 13px; }
#total-value {
  color: #ffd700; font-size: 32px; font-weight: bold;
  text-shadow: 0 0 15px rgba(255,215,0,0.5);
}

/* Hint */
#hint {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.5); font-size: 14px; z-index: 10;
  pointer-events: none; transition: opacity 0.5s;
}

/* Dice colors */
.d2  { color: #e0e0e0; }
.d4  { color: #4fc3f7; }
.d6  { color: #ef5350; }
.d8  { color: #66bb6a; }
.d10 { color: #ffa726; }
.d12 { color: #ab47bc; }
.d20 { color: #ec407a; }
.d100{ color: #ffee58; }
</style>
</head>
<body>

<div id="panel">
  <div id="panel-title">骰子选择</div>
  <div id="dice-selector"></div>
  <button id="roll-btn">🎲 掷骰子</button>
  <button id="clear-btn">清空桌面</button>
</div>

<div id="results" style="display:none;">
  <div id="results-title">掷骰结果</div>
  <div id="results-content"></div>
  <div id="total-bar">
    <div id="total-label">总和</div>
    <div id="total-value">0</div>
  </div>
</div>

<div id="hint">点击「掷骰子」开始</div>

<div id="canvas-container"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/examples/js/controls/OrbitControls.js"></script>

<script>

// ============ CONFIG ============
const DICE_TYPES = [
  { name: 'D4',   sides: 4,   color: 0x4fc3f7, css: 'd4'  },
  { name: 'D6',   sides: 6,   color: 0xef5350, css: 'd6'  },
  { name: 'D8',   sides: 8,   color: 0x66bb6a, css: 'd8'  },
  { name: 'D10',  sides: 10,  color: 0xffa726, css: 'd10' },
  { name: 'D12',  sides: 12,  color: 0xab47bc, css: 'd12' },
  { name: 'D20',  sides: 20,  color: 0xec407a, css: 'd20' },
  { name: 'D100', sides: 100, color: 0xffee58, css: 'd100'}
];

const diceCounts = {};
DICE_TYPES.forEach(d => diceCounts[d.name] = 0);
diceCounts['D6'] = 2; // default

// ============ BUILD UI ============
const selectorEl = document.getElementById('dice-selector');
DICE_TYPES.forEach(dt => {
  const row = document.createElement('div');
  row.className = 'dice-row';
  row.innerHTML = `
    <span class="dice-label ${dt.css}">${dt.name}</span>
    <div class="dice-count-controls">
      <button data-dice="${dt.name}" data-dir="-1">−</button>
      <span class="dice-count" id="count-${dt.name}">${diceCounts[dt.name]}</span>
      <button data-dice="${dt.name}" data-dir="1">+</button>
    </div>
  `;
  selectorEl.appendChild(row);
});

selectorEl.addEventListener('click', e => {
  const btn = e.target.closest('button[data-dice]');
  if (!btn) return;
  const name = btn.dataset.dice;
  const dir = parseInt(btn.dataset.dir);
  diceCounts[name] = Math.max(0, Math.min(20, diceCounts[name] + dir));
  document.getElementById(`count-${name}`).textContent = diceCounts[name];
});

// ============ THREE.JS SETUP ============
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 30, 60);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 18, 14);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI / 2.2;
controls.minDistance = 8;
controls.maxDistance = 35;
controls.target.set(0, 0, 0);

// ============ LIGHTING ============
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
mainLight.position.set(8, 20, 8);
mainLight.castShadow = true;
mainLight.shadow.mapSize.set(2048, 2048);
mainLight.shadow.camera.left = -15;
mainLight.shadow.camera.right = 15;
mainLight.shadow.camera.top = 15;
mainLight.shadow.camera.bottom = -15;
mainLight.shadow.camera.near = 1;
mainLight.shadow.camera.far = 50;
mainLight.shadow.bias = -0.001;
scene.add(mainLight);

const fillLight = new THREE.DirectionalLight(0x8888ff, 0.3);
fillLight.position.set(-5, 10, -5);
scene.add(fillLight);

const pointLight = new THREE.PointLight(0xffd700, 0.5, 30);
pointLight.position.set(0, 10, 0);
scene.add(pointLight);

// ============ TABLE ============
function createTable() {
  const group = new THREE.Group();

  // Octagonal table top
  const shape = new THREE.Shape();
  const radius = 10;
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2 - Math.PI / 8;
    const x = Math.cos(angle) * radius;
    const y = Math.sin(angle) * radius;
    if (i === 0) shape.moveTo(x, y);
    else shape.lineTo(x, y);
  }
  shape.closePath();

  // Green felt surface
  const feltGeom = new THREE.ExtrudeGeometry(shape, { depth: 0.3, bevelEnabled: true, bevelThickness: 0.05, bevelSize: 0.05, bevelSegments: 3 });
  const feltMat = new THREE.MeshStandardMaterial({
    color: 0x1b5e20, roughness: 0.85, metalness: 0.05
  });
  const felt = new THREE.Mesh(feltGeom, feltMat);
  felt.rotation.x = -Math.PI / 2;
  felt.position.y = -0.15;
  felt.receiveShadow = true;
  group.add(felt);

  // Wooden rim
  const rimShape = new THREE.Shape();
  const rimOuter = 10.5;
  const rimInner = 9.8;
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2 - Math.PI / 8;
    const x = Math.cos(angle) * rimOuter;
    const y = Math.sin(angle) * rimOuter;
    if (i === 0) rimShape.moveTo(x, y);
    else rimShape.lineTo(x, y);
  }
  rimShape.closePath();

  const holePath = new THREE.Path();
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2 - Math.PI / 8;
    const x = Math.cos(angle) * rimInner;
    const y = Math.sin(angle) * rimInner;
    if (i === 0) holePath.moveTo(x, y);
    else holePath.lineTo(x, y);
  }
  holePath.closePath();
  rimShape.holes.push(holePath);

  const rimGeom = new THREE.ExtrudeGeometry(rimShape, { depth: 0.8, bevelEnabled: true, bevelThickness: 0.05, bevelSize: 0.05 });
  const rimMat = new THREE.MeshStandardMaterial({
    color: 0x5d4037, roughness: 0.6, metalness: 0.1
  });
  const rim = new THREE.Mesh(rimGeom, rimMat);
  rim.rotation.x = -Math.PI / 2;
  rim.position.y = -0.2;
  rim.castShadow = true;
  rim.receiveShadow = true;
  group.add(rim);

  // Raised bumper walls
  for (let i = 0; i < 8; i++) {
    const angle1 = (i / 8) * Math.PI * 2 - Math.PI / 8;
    const angle2 = ((i + 1) / 8) * Math.PI * 2 - Math.PI / 8;
    const midAngle = (angle1 + angle2) / 2;
    const wallLen = 2 * rimInner * Math.sin(Math.PI / 8);
    const wallGeom = new THREE.BoxGeometry(wallLen, 0.8, 0.3);
    const wallMat = new THREE.MeshStandardMaterial({ color: 0x4e342e, roughness: 0.5, metalness: 0.1 });
    const wall = new THREE.Mesh(wallGeom, wallMat);
    const wx = Math.cos(midAngle) * (rimInner + 0.15);
    const wz = Math.sin(midAngle) * (rimInner + 0.15);
    wall.position.set(wx, 0.4, wz);
    wall.rotation.y = -midAngle + Math.PI / 2;
    wall.castShadow = true;
    wall.receiveShadow = true;
    group.add(wall);
  }

  return group;
}

const table = createTable();
scene.add(table);

// ============ DICE GEOMETRY BUILDERS ============

function makeTextTexture(text, size, fgColor, bgColor) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, size, size);
  ctx.fillStyle = fgColor;
  ctx.font = `bold ${size * 0.5}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, size / 2, size / 2);
  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function hexToCSS(hex) {
  return '#' + hex.toString(16).padStart(6, '0');
}

function darkenColor(hex, factor) {
  const r = ((hex >> 16) & 0xff) * factor;
  const g = ((hex >> 8) & 0xff) * factor;
  const b = (hex & 0xff) * factor;
  return (Math.round(r) << 16) | (Math.round(g) << 8) | Math.round(b);
}

// D6 - cube
function createD6(color) {
  const size = 0.9;
  const radius = 0.1;
  const geom = new THREE.BoxGeometry(size, size, size, 4, 4, 4);

  // Round the edges slightly
  const pos = geom.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    let x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
    const half = size / 2;
    const len = Math.sqrt(
      Math.max(0, Math.abs(x) - half + radius) ** 2 +
      Math.max(0, Math.abs(y) - half + radius) ** 2 +
      Math.max(0, Math.abs(z) - half + radius) ** 2
    );
    if (len > 0) {
      const scale = 1 - (len - radius) / (len || 1) * 0.3;
      // subtle rounding
    }
  }

  const bg = hexToCSS(darkenColor(color, 0.7));
  const fg = '#ffffff';
  // Pip patterns for each face
  const pipPatterns = [
    [[0.5, 0.5]],                                                           // 1
    [[0.3, 0.3], [0.7, 0.7]],                                               // 2
    [[0.3, 0.3], [0.5, 0.5], [0.7, 0.7]],                                   // 3
    [[0.3, 0.3], [0.7, 0.3], [0.3, 0.7], [0.7, 0.7]],                       // 4
    [[0.3, 0.3], [0.7, 0.3], [0.5, 0.5], [0.3, 0.7], [0.7, 0.7]],           // 5
    [[0.3, 0.3], [0.7, 0.3], [0.3, 0.5], [0.7, 0.5], [0.3, 0.7], [0.7, 0.7]] // 6
  ];

  const materials = [];
  // Face order for BoxGeometry: +x, -x, +y, -y, +z, -z
  const faceValues = [3, 4, 1, 6, 2, 5]; // standard die opposite faces sum to 7
  for (let f = 0; f < 6; f++) {
    const val = faceValues[f];
    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 256;
    const ctx = canvas.getContext('2d');

    // Background with rounded corners
    ctx.fillStyle = bg;
    const r2 = 20;
    ctx.beginPath();
    ctx.moveTo(r2, 0); ctx.lineTo(256-r2, 0); ctx.quadraticCurveTo(256,0,256,r2);
    ctx.lineTo(256,256-r2); ctx.quadraticCurveTo(256,256,256-r2,256);
    ctx.lineTo(r2,256); ctx.quadraticCurveTo(0,256,0,256-r2);
    ctx.lineTo(0,r2); ctx.quadraticCurveTo(0,0,r2,0);
    ctx.closePath();
    ctx.fill();

    // Draw pips
    const pips = pipPatterns[val - 1];
    ctx.fillStyle = fg;
    pips.forEach(([px, py]) => {
      ctx.beginPath();
      ctx.arc(px * 256, py * 256, 22, 0, Math.PI * 2);
      ctx.fill();
    });

    const tex = new THREE.CanvasTexture(canvas);
    tex.colorSpace = THREE.SRGBColorSpace;
    materials.push(new THREE.MeshStandardMaterial({
      map: tex, roughness: 0.4, metalness: 0.1
    }));
  }

  const mesh = new THREE.Mesh(geom, materials);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  return mesh;
}

// D4 - tetrahedron
function createD4(color) {
  const geom = new THREE.TetrahedronGeometry(0.75);
  const bg = hexToCSS(darkenColor(color, 0.7));
  const mat = new THREE.MeshStandardMaterial({
    color: color, roughness: 0.35, metalness: 0.15,
    flatShading: true
  });
  const mesh = new THREE.Mesh(geom, mat);

  // Add number labels as sprites
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  return mesh;
}

// D8 - octahedron
function createD8(color) {
  const geom = new THREE.OctahedronGeometry(0.7);
  const mat = new THREE.MeshStandardMaterial({
    color: color, roughness: 0.35, metalness: 0.15,
    flatShading: true
  });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  return mesh;
}

// D10
function createD10(color) {
  // Pentagonal trapezohedron approximation using lathe
  const points = [];
  const topY = 0.9, midY = 0, botY = -0.9;
  const midR = 0.7, tipR = 0;
  points.push(new THREE.Vector2(tipR, topY));
  points.push(new THREE.Vector2(midR, midY * 0.15));
  points.push(new THREE.Vector2(tipR, botY));
  const geom = new THREE.LatheGeometry(points, 10);
  const mat = new THREE.MeshStandardMaterial({
    color: color, roughness: 0.35, metalness: 0.15,
    flatShading: true
  });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  return mesh;
}

// D12 - dodecahedron
function createD12(color) {
  const geom = new THREE.DodecahedronGeometry(0.7);
  const mat = new THREE.MeshStandardMaterial({
    color: color, roughness: 0.35, metalness: 0.15,
    flatShading: true
  });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  return mesh;
}

// D20 - icosahedron
function createD20(color) {
  const geom = new THREE.IcosahedronGeometry(0.7);
  const mat = new THREE.MeshStandardMaterial({
    color: color, roughness: 0.35, metalness: 0.15,
    flatShading: true
  });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  return mesh;
}

// Generic die creator
function createDieMesh(sides, color) {
  switch (sides) {
    case 4: return createD4(color);
    case 6: return createD6(color);
    case 8: return createD8(color);
    case 10: return createD10(color);
    case 12: return createD12(color);
    case 20: return createD20(color);
    case 100: return createD10(color); // D100 is a D10 visually
    default: return createD6(color);
  }
}

// ============ PHYSICS SIMULATION (Simple custom) ============
class DiePhysics {
  constructor(mesh, startPos) {
    this.mesh = mesh;
    this.position = startPos.clone();
    this.velocity = new THREE.Vector3(
      (Math.random() - 0.5) * 8,
      Math.random() * 3 + 2,
      (Math.random() - 0.5) * 8
    );
    // Random rotation axis and speed
    this.angularVel = new THREE.Vector3(
      (Math.random() - 0.5) * 15,
      (Math.random() - 0.5) * 15,
      (Math.random() - 0.5) * 15
    );
    this.settled = false;
    this.settleTimer = 0;
    this.gravity = -18;
    this.bounceDamping = 0.35;
    this.frictionDamping = 0.97;
    this.angularDamping = 0.96;
    this.tableRadius = 9.2;
    this.floorY = 0.5; // top of table + half die size
  }

  update(dt) {
    if (this.settled) return;

    // Gravity
    this.velocity.y += this.gravity * dt;

    // Update position
    this.position.addScaledVector(this.velocity, dt);

    // Floor collision
    if (this.position.y < this.floorY) {
      this.position.y = this.floorY;
      this.velocity.y = -this.velocity.y * this.bounceDamping;
      if (Math.abs(this.velocity.y) < 0.3) this.velocity.y = 0;
      // Friction on bounce
      this.velocity.x *= 0.85;
      this.velocity.z *= 0.85;
      this.angularVel.multiplyScalar(0.85);
    }

    // Wall collision (octagonal boundary)
    const dist = Math.sqrt(this.position.x ** 2 + this.position.z ** 2);
    if (dist > this.tableRadius) {
      const nx = this.position.x / dist;
      const nz = this.position.z / dist;
      this.position.x = nx * this.tableRadius;
      this.position.z = nz * this.tableRadius;
      const dot = this.velocity.x * nx + this.velocity.z * nz;
      this.velocity.x -= 2 * dot * nx * 0.6;
      this.velocity.z -= 2 * dot * nz * 0.6;
      this.angularVel.multiplyScalar(0.8);
    }

    // Damping
    this.velocity.x *= this.frictionDamping;
    this.velocity.z *= this.frictionDamping;
    this.angularVel.multiplyScalar(this.angularDamping);

    // Apply rotation
    const rotQ = new THREE.Quaternion();
    const angLen = this.angularVel.length() * dt;
    if (angLen > 0.001) {
      const axis = this.angularVel.clone().normalize();
      rotQ.setFromAxisAngle(axis, angLen);
      this.mesh.quaternion.premultiply(rotQ);
    }

    this.mesh.position.copy(this.position);

    // Check if settled
    const speed = this.velocity.length();
    const angSpeed = this.angularVel.length();
    if (speed < 0.15 && angSpeed < 0.3 && this.position.y <= this.floorY + 0.05) {
      this.settleTimer += dt;
      if (this.settleTimer > 0.3) {
        this.settled = true;
        this.velocity.set(0, 0, 0);
        this.angularVel.set(0, 0, 0);
      }
    } else {
      this.settleTimer = 0;
    }
  }
}

// ============ GAME STATE ============
let activeDice = []; // { mesh, physics, type, sides, value }
let isRolling = false;

function clearDice() {
  activeDice.forEach(d => scene.remove(d.mesh));
  activeDice = [];
  document.getElementById('results').style.display = 'none';
  document.getElementById('hint').style.opacity = '1';
}

function rollDice() {
  if (isRolling) return;

  // Count total dice
  let totalDice = 0;
  DICE_TYPES.forEach(dt => totalDice += diceCounts[dt.name]);
  if (totalDice === 0) return;

  clearDice();
  isRolling = true;
  document.getElementById('hint').style.opacity = '0';

  let index = 0;
  DICE_TYPES.forEach(dt => {
    for (let i = 0; i < diceCounts[dt.name]; i++) {
      const mesh = createDieMesh(dt.sides, dt.color);
      // Start from above, spread out
      const angle = (index / totalDice) * Math.PI * 2 + Math.random() * 0.5;
      const r = 2 + Math.random() * 3;
      const startPos = new THREE.Vector3(
        Math.cos(angle) * r,
        6 + Math.random() * 4,
        Math.sin(angle) * r
      );
      mesh.position.copy(startPos);
      // Random initial rotation
      mesh.rotation.set(
        Math.random() * Math.PI * 2,
        Math.random() * Math.PI * 2,
        Math.random() * Math.PI * 2
      );
      scene.add(mesh);

      const physics = new DiePhysics(mesh, startPos);
      const value = dt.sides === 100
        ? (Math.floor(Math.random() * 10) * 10 + Math.floor(Math.random() * 10) + 1)  // 1-100
        : Math.floor(Math.random() * dt.sides) + 1;

      activeDice.push({
        mesh, physics, type: dt, sides: dt.sides, value
      });
      index++;
    }
  });
}

function showResults() {
  const resultsContent = document.getElementById('results-content');
  resultsContent.innerHTML = '';
  let total = 0;

  // Group by type
  const groups = {};
  activeDice.forEach(d => {
    if (!groups[d.type.name]) groups[d.type.name] = { type: d.type, values: [] };
    groups[d.type.name].values.push(d.value);
    total += d.value;
  });

  Object.values(groups).forEach(g => {
    const groupEl = document.createElement('div');
    groupEl.className = 'result-group';
    groupEl.innerHTML = `
      <div class="result-group-label ${g.type.css}">${g.type.name}</div>
      <div class="result-values">
        ${g.values.map(v => `<span class="result-chip">${v}</span>`).join('')}
      </div>
    `;
    resultsContent.appendChild(groupEl);
  });

  document.getElementById('total-value').textContent = total;
  document.getElementById('results').style.display = 'block';
}

// ============ ANIMATION ============
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  controls.update();

  if (isRolling) {
    let allSettled = true;
    activeDice.forEach(d => {
      d.physics.update(dt);
      if (!d.physics.settled) allSettled = false;
    });

    if (allSettled && activeDice.length > 0) {
      isRolling = false;
      // Snap dice to nice orientations and show numbers
      activeDice.forEach(d => {
        addNumberLabel(d);
      });
      showResults();
    }
  }

  renderer.render(scene, camera);
}

// Add floating number label above settled die
function addNumberLabel(die) {
  const canvas = document.createElement('canvas');
  canvas.width = 128;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');

  // Semi-transparent background
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  const r = 12;
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(128-r, 0); ctx.quadraticCurveTo(128,0,128,r);
  ctx.lineTo(128,64-r); ctx.quadraticCurveTo(128,64,128-r,64);
  ctx.lineTo(r,64); ctx.quadraticCurveTo(0,64,0,64-r);
  ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = hexToCSS(die.type.color);
  ctx.font = 'bold 36px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(die.value.toString(), 64, 32);

  const texture = new THREE.CanvasTexture(canvas);
  texture.colorSpace = THREE.SRGBColorSpace;
  const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.scale.set(1.2, 0.6, 1);
  sprite.position.copy(die.mesh.position);
  sprite.position.y += 1.2;
  scene.add(sprite);

  // Store for cleanup
  die.label = sprite;
}

// Override clear to also remove labels
const origClear = clearDice;
clearDice = function() {
  activeDice.forEach(d => {
    scene.remove(d.mesh);
    if (d.label) scene.remove(d.label);
  });
  activeDice = [];
  document.getElementById('results').style.display = 'none';
  document.getElementById('hint').style.opacity = '1';
};

// ============ EVENTS ============
document.getElementById('roll-btn').addEventListener('click', rollDice);
document.getElementById('clear-btn').addEventListener('click', clearDice);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Keyboard shortcut
window.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    rollDice();
  }
});

animate();
</script>
